<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, button { padding: 8px; margin: 5px 0; }
        #message { margin-top: 10px; font-weight: bold; }
        #texts { margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Write a blog</h2>
    <input type="text" id="textInput" placeholder="Enter text" />
    <button onclick="submitText()">Submit</button>
    <div id="message"></div>

    <div id="texts"></div>

    <script>
        async function submitText() {
            const text = document.getElementById("textInput").value;
            const messageDiv = document.getElementById("message");

            const res = await fetch("http://localhost:3000/submit-text", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text })
            });
            const data = await res.json();

            messageDiv.textContent = data.message;
            if(data.success){
                document.getElementById("textInput").value = "";
                loadTexts();
            }
        }

        async function loadTexts() {
            const res = await fetch("http://localhost:3000/texts");
            const texts = await res.json();
            const textsDiv = document.getElementById("texts");
            textsDiv.innerHTML = "<h3>Saved Texts:</h3>" + texts.map(t => `<p>${t.content}</p>`).join("");
        }

        // Load texts on page load
        loadTexts();
    </script>
</body>
</html>
